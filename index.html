    <meta name="robots" content="index,follow">
    <style>
        * {
          margin: 0;
          padding: 0;
         box-sizing: border-box;
            font-family: "Segoe UI", Roboto, "Microsoft YaHei", sans-serif;
        }

    body {
        background-image: url('./bg.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
           min-height: 100vh;
           position: relative;
        }

       .container {
           position: relative;
           z-index: 1;
           color: #333;
         padding: 30px 20px;
         max-width: 800px;
         margin: 0 auto;
           line-height: 1.6;
        background-color: rgba(255, 255, 255, 0.9);
           min-height: 100vh;
        backdrop-filter: blur(5px);
          display: none;
       }

       .show-btn {
           position: fixed;
           top: 20px;
           left: 20px;
           z-index: 100;
         padding: 12px 30px;
           font-size: 16px;
         background-color: rgba(255, 255, 255, 0.9);
           color: #333;
         border: 2px solid #2d7ff9;
         border-radius: 25px;
           cursor: pointer;
           transition: all 0.3s;
         box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
       }

       .show-btn:hover {
         background-color: #2d7ff9;
           color: #fff;
       }

       .close-btn {
           position: fixed;
           top: 20px;
           right: 20px;
           z-index: 100;
         padding: 12px 30px;
           font-size: 16px;
         background-color: rgba(255, 255, 255, 0.9);
           color: #333;
         border: 2px solid #ff6b6b;
         border-radius: 25px;
           cursor: pointer;
           transition: all 0.3s;
         box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
           display: none;
       }

       .close-btn:hover {
         background-color: #ff6b6b;
           color: #fff;
       }

        h1 {
            font-size: 26px;
            color: #222;
         margin-bottom: 10px;
            text-align: center;
        }

        h2 {
            font-size: 18px;
            color: #444;
          margin: 20px 0 10px;
          padding-bottom: 6px;
         border-bottom: 2px solid #e8f0fe;
        }

        h3 {
            font-size: 16px;
            color: #555;
          margin: 20px 0 10px;
        }

        hr {
        border: none;
            height: 1px;
        background-color: #eee;
          margin: 25px 0;
        }

        a {
            color: #2d7ff9;
            text-decoration: none;
          padding: 8px 12px;
        border-radius: 6px;
            transition: background 0.2s;
            display: inline-block;
          margin: 4px 0;
        }

        a:hover {
        background-color: #f0f5ff;
        }

        p {
           text-align: center;
          margin-top: 30px;
            font-size: 14px;
            color: #666;
        }
    </style>
    <script>
        function showContent() {
            document.querySelector('.show-btn').style.display = 'none';
            document.querySelector('.container').style.display = 'block';
            document.querySelector('.close-btn').style.display = 'block';
        }

        function closeContent() {
            document.querySelector('.show-btn').style.display = 'block';
            document.querySelector('.container').style.display = 'none';
            document.querySelector('.close-btn').style.display = 'none';
        }
    </script>
</head>
<body>
<button class="show-btn" onclick="showContent()">点击进入</button>
<button class="close-btn" onclick="closeContent()">关闭页面</button>
