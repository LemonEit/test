<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>元素的分类</title>
    <style>
        span{
            height: 500px;
            width: 500px;
            display: none;
            border: #CE424B 1px solid;
            text-align: center;
            line-height: 500px;
            background-color: #E0E0E0;
        }




    </style>
</head>
<body>
        <span> span </span><br>  <!-- 内联元素 -->
            <p> p </p><br>  <!-- 块级元素 -->
        <div> div</div> <br>  <!-- 块级元素 -->
        <a href="#"> a </a><br>  <!-- 内联元素 -->
<img src=""></img><br>  <!-- 内联元素 -->
<input type="text"></input><br>  <!-- 内联元素 -->
<textarea></textarea><br>  <!-- 块级元素 -->
</body>
</html>
