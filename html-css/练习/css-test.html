<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>css样式测试</title>
    <style>
        #ts {
            color: green;
            /*添加蓝色边框 */
            border: 10px solid #66ccff;
            /*添加10px的圆角 */
            border-radius: 10px;
            width: 1200px; /*添加宽度 */
            height: 600px; /*添加高度 */
            font-family: 仿宋_GB2312; /*添加字体 */
            font-size: 50px; /*添加字体大小 */
            /*下划线 */
            text-decoration: underline;
            /*居中 */
            text-align: center;
            /*页面居中 */
            margin: auto;
        }
    </style>
</head>
<body>
<div id="ts">
    <p class="q">这是一段随机生成的测试文字，用于验证 CSS 样式效果。</p>
    <p class="q">Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore
        magna aliqua.</p>

</div>

</body>
</html>
