<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        ul{
            width: 260px;
            list-style-type: none;
        }
        li{
            height: 60px;
            border-bottom: 2px #F4F4F4 solid;
            text-align: left;
            line-height: 60px;
        }
        a{
            /*去掉下划线*/
            text-decoration: none;
            color: #3C3E40;
        }
        a:hover{
            color: #CE424B;
        }
        li>span{
            color: #CE424B;
        }


    </style>
</head>
<body>
<ul>
    <li><b>图书畅销榜</b></li>
    <li><span>1</span>&nbsp;&nbsp;&nbsp;<a href="#">当我足够好,才会遇见你</a></li>
    <li><span>2</span>&nbsp;&nbsp;&nbsp;<a href="#">皮囊</a></li>
    <li><span>3</span>&nbsp;&nbsp;&nbsp;<a href="#">李光耀论中国与世界</a></li>
    <li><span>4</span>&nbsp;&nbsp;&nbsp;<a href="#">乖,摸摸头</a></li>
    <li><span>5</span>&nbsp;&nbsp;&nbsp;<a href="#">男女内参</a></li>
</ul>
</body>
</html>
