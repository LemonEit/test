<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>列表</title>
</head>
<body>
<!-- 页面标题 -->
<h3>手机品牌</h3>

<!-- 有序列表（横向排列，不换行） -->
<!-- type="i" 表示使用小写罗马数字编号 -->
<ol type="i" style="display: flex; flex-wrap: nowrap; gap: 10px; list-style-position: inside;">
    <li style="display: inline-block;">华为</li>
    <li style="display: inline-block;">oppo</li>
    <li style="display: inline-block;">三星</li>
    <li style="display: inline-block;">苹果</li>
    <li style="display: inline-block;">vivo</li>
    <li style="display: inline-block;">iqoo</li>
    <li style="display: inline-block;">真我</li>
</ol>

<!-- 无序列表（默认样式，实心圆点） -->
<ul>
    <li>1</li>
    <li>1</li>
    <li>1</li>
    <li>1</li>
    <li>1</li>
    <li>1</li>
    <li>1</li>
    <li>1</li>
</ul>

<!-- 自定义列表（注意：ui 不是标准 HTML 标签，应该使用 dl） -->
<ui none>
    <li>222</li>
    <li>222</li>
</ui>

table>tr>td*3
</body>
</html>
