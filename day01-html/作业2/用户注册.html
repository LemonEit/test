<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIP会员注册信息</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      padding: 20px;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }

    .register-table {
      width: 100%;
      border-collapse: collapse;
      border: 1px solid #000;
    }

    .register-table th {
      padding: 15px;
      font-size: 22px;
      border: 1px solid #000;
      background-color: #f9f9f9;
    }

    .register-table td {
      padding: 8px 12px;
      border: 1px solid #000;
      vertical-align: middle;
    }

    .register-table td:first-child {
      width: 120px;
      font-weight: 500;
    }

    /* 表单元素样式 */
    input[type="text"],
    input[type="password"],
    select {
      padding: 4px 6px;
      border: 1px solid #ccc;
      width: 220px;
    }

    input[type="radio"],
    input[type="checkbox"] {
      margin-right: 4px;
      cursor: pointer;
    }

    .btn-group {
      text-align: center;
    }

    button {
      padding: 6px 20px;
      margin: 0 10px;
      cursor: pointer;
      background-color: #f0f0f0;
      border: 1px solid #999;
      border-radius: 2px;
    }

    button:hover {
      background-color: #e0e0e0;
    }

    .qq-icon {
      width: 40px;
      height: 40px;
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>
<table class="register-table">
  <thead>
  <tr>
    <th colspan="4">VIP会员注册信息</th>
  </tr>
  </thead>
  <tbody>
  <!-- 姓名行 -->
  <tr>
    <td>姓名</td>
    <td><input type="text" name="username"></td>
    <td>注册时间</td>
    <td>2017年11月26日 13:53:29</td>
  </tr>
  <!-- 密码行 -->
  <tr>
    <td>密码</td>
    <td><input type="password" name="password"></td>
    <td>确认密码</td>
    <td><input type="password" name="repassword"></td>
  </tr>
  <!-- 性别行 -->
  <tr>
    <td>性别</td>
    <td>
      <input type="radio" name="gender" value="male" checked> 男
      <input type="radio" name="gender" value="female"> 女
    </td>
    <td>年龄</td>
    <td><input type="text" name="age"></td>
  </tr>
  <!-- 职业行 -->
  <tr>
    <td>职业</td>
    <td colspan="3">
      <select name="occupation">
        <option value="">请选择职业</option>
        <option value="student">学生</option>
        <option value="worker">职员</option>
        <option value="teacher">教师</option>
        <option value="engineer">工程师</option>
        <option value="other">其他</option>
      </select>
    </td>
  </tr>
  <!-- Email行 -->
  <tr>
    <td>Email</td>
    <td colspan="3"><input type="text" name="email"></td>
  </tr>
  <!-- 爱好行 -->
  <tr>
    <td>爱好</td>
    <td colspan="2">
      <input type="checkbox" name="hobby" value="music"> 音乐
      <input type="checkbox" name="hobby" value="sports"> 体育
      <input type="checkbox" name="hobby" value="literature"> 文学
      <input type="checkbox" name="hobby" value="game"> 游戏
    </td>
    <td rowspan="3" align="center" valign="middle">
      <img src="img/3.ico" alt="QQ图标" class="qq-icon">
    </td>
  </tr>
  <!-- 头像行 -->
  <tr>
    <td>头像</td>
    <td colspan="2">
      <input type="file" name="avatar">
    </td>
  </tr>
  <!-- 提交按钮行 -->
  <tr>
    <td colspan="2" class="btn-group">
      <button type="submit">提交</button>
    </td>
    <td colspan="2" class="btn-group">
      <button type="reset">重置</button>
    </td>
  </tr>
  </tbody>
</table>
</body>
</html>
